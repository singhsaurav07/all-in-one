<script>
/* ============ DATA ============ */
const tabs = [
  {id:"overview", label:"Overview"},
  {id:"art1-4", label:"Articles 1–4"},
  {id:"citizen5-11", label:"Citizenship Art 5–11"},

/* ============ RENDER NAV ============ */
const nav = document.getElementById('tabNav');
tabs.forEach((t,i)=>{
  const b=document.createElement('button');
  b.className='tab-btn'+(i===0?' active':'');
  b.textContent=t.label;
  b.onclick=()=>showTab(t.id);
  b.dataset.tab=t.id;
  nav.appendChild(b);
});

function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===id));
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleAnswer(el){
  el.nextElementSibling.classList.toggle('show');
}

/* ============ BUILD MAIN CONTENT ============ */
const main = document.getElementById('mainContent');

main.innerHTML = `

<!-- OVERVIEW -->
<section class="section active" id="overview">
  <h2 class="section-title">Chapter Overview</h2>
  <p class="section-sub">Part I (Articles 1–4) + Part II (Articles 5–11) of the Constitution — a compact but exam-heavy chapter.</p>

  <div class="overview-hero">
    <h3>What this chapter covers</h3>
    <ul>
      <li><b>Part I</b> — Union and its Territory (Articles 1–4): name of the country, how new states are formed, how boundaries/names change.</li>
      <li><b>Part II</b> — Citizenship (Articles 5–11): who was a citizen at commencement, and Parliament's power to make citizenship law → led to the <b>Citizenship Act, 1955</b>.</li>
      <li>Modern extensions tested: <b>CAA 2019</b>, <b>OCI scheme</b>, <b>States Reorganisation</b> history.</li>
    </ul>
    <div class="stat-row">
      <div class="stat"><div class="num">4</div><div class="lbl">Articles in Part I</div></div>
      <div class="stat"><div class="num">7</div><div class="lbl">Articles in Part II (5–11)</div></div>
      <div class="stat"><div class="num">28+8</div><div class="lbl">States + UTs</div></div>
      <div class="stat"><div class="num">1955</div><div class="lbl">Citizenship Act</div></div>
    </div>
  </div>

  <div class="grid cols-2">
    <div class="card">
      <h3>Why this chapter is high-yield</h3>
      <ul>
        <li>Articles 1–4 and 5–11 are directly quoted in MCQs almost every year.</li>
        <li>State formation dates (Telangana, J&K reorganisation) are recurring favourites.</li>
        <li>CAA 2019 is a current-affairs + static overlap — high probability zone.</li>
        <li>OCI vs NRI vs PIO comparison is a classic "match the following" trap.</li>
      </ul>
    </div>
    <div class="card">
      <h3>India as a "Union of States" — key idea</h3>
      <ul>
        <li>Article 1 deliberately avoids the word <b>"Federation"</b> — India is a <b>Union</b>, indestructible, states are destructible (can be reorganised by Parliament).</li>
        <li>This is different from the US model where states can't be altered without their consent.</li>
        <li>Dr. B.R. Ambedkar clarified: Union because it is <b>not a result of an agreement</b> between states, and no state has the right to secede.</li>
      </ul>
    </div>
  </div>
</section>

<!-- ARTICLES 1-4 -->
<section class="section" id="art1-4">
  <h2 class="section-title">Articles 1–4 — Union & States, New State Formation</h2>
  <p class="section-sub">Part I of the Constitution</p>

  <div class="grid cols-2">
    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>Article 1 — Name and territory of India</h3>
      <ul>
        <li>"<b>India, that is Bharat, shall be a Union of States</b>."</li>
        <li>Territory of India includes: (a) territories of the States, (b) Union Territories, (c) any other territory that may be acquired.</li>
        <li>"Union" chosen deliberately over "Federation" — signals indestructible union of destructible states.</li>
      </ul>
      <div class="mnemonic"><b>Mnemonic:</b> "1 = Identity" → Article 1 gives India its <b>name & shape</b>.</div>
    </div>

    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>Article 2 — Admission or establishment of new states</h3>
      <ul>
        <li>Parliament may <b>admit</b> new states into the Union, or <b>establish</b> new states, on terms it thinks fit.</li>
        <li>Deals with <b>external territories</b> not originally part of India (e.g., Sikkim's earlier association, Puducherry/Goa admission).</li>
      </ul>
    </div>

    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>Article 3 — Formation of new states; alteration of areas, boundaries, names</h3>
      <ul>
        <li>Parliament (by <b>simple majority</b>) may: form a new state, increase/decrease area of a state, alter boundaries, or alter the name of a state.</li>
        <li>Deals with <b>internal reorganisation</b> of existing Indian territory.</li>
        <li><b>Procedure:</b> Bill can be introduced only on <b>President's recommendation</b>; President refers the Bill to the affected State Legislature for its views within a specified time — but Parliament is <b>not bound</b> by that view.</li>
        <li>This is why India is called <b>"quasi-federal"</b> — Parliament can alter state boundaries without state consent.</li>
      </ul>
      <div class="mnemonic"><b>Mnemonic:</b> "3 = Reshape" → Article 3 lets Parliament <b>redraw the map</b>.</div>
    </div>

    <div class="card">
      <span class="freq MEDIUM">MEDIUM</span>
      <h3>Article 4 — Laws under Art. 2 & 3 not "amendments" under Art. 368</h3>
      <ul>
        <li>Laws made under Articles 2 and 3 (for admission/formation of states, consequential changes in the First & Fourth Schedules) are <b>not treated as constitutional amendments</b> under Article 368.</li>
        <li>They can be passed by <b>simple majority</b>, not the special majority needed for amendments.</li>
      </ul>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <span class="freq HIGH">HIGH</span>
    <h3>Union vs Federation — comparison trap</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Feature</th><th>Typical Federation (e.g., USA)</th><th>India (Union of States)</th></tr>
        <tr><td>Formed by</td><td>Agreement among independent states</td><td>Not a result of agreement; single source of authority</td></tr>
        <tr><td>Right to secede</td><td>May exist in theory</td><td>No state can secede</td></tr>
        <tr><td>Boundary change</td><td>Needs state consent</td><td>Parliament alone decides (Art. 3), state view is only advisory</td></tr>
        <tr><td>Word used</td><td>"Federation"</td><td>"Union" (Art. 1)</td></tr>
      </table>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <span class="freq HIGH">HIGH</span>
    <h3>Major state reorganisations — timeline</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Year</th><th>Event</th></tr>
        <tr><td>1953</td><td>Andhra State carved out of Madras (first linguistic state)</td></tr>
        <tr><td>1956</td><td>States Reorganisation Act — states reorganised on linguistic basis (Fazl Ali Commission, 1953)</td></tr>
        <tr><td>1960</td><td>Bombay State split into Maharashtra & Gujarat</td></tr>
        <tr><td>1963</td><td>Nagaland formed (16th state)</td></tr>
        <tr><td>1966</td><td>Haryana carved out of Punjab</td></tr>
        <tr><td>1971–72</td><td>Himachal Pradesh, Manipur, Tripura, Meghalaya become states</td></tr>
        <tr><td>1975</td><td>Sikkim becomes a state (36th Amendment)</td></tr>
        <tr><td>1987</td><td>Mizoram, Arunachal Pradesh, Goa become states</td></tr>
        <tr><td>2000</td><td>Chhattisgarh, Uttarakhand, Jharkhand carved out (MP, UP, Bihar)</td></tr>
        <tr><td>2014</td><td>Telangana carved out of Andhra Pradesh (29th state)</td></tr>
        <tr><td>2019</td><td>J&K Reorganisation Act — J&K and Ladakh become Union Territories (Article 370 abrogated)</td></tr>
      </table>
    </div>
    <div class="mnemonic"><b>Mnemonic (2000 trio):</b> "<b>C</b>hhattisgarh, <b>U</b>ttarakhand, <b>J</b>harkhand" → <b>"CUJ"</b> all born in 2000.</div>
    <div class="bihar"><b>Bihar Connect:</b> Jharkhand was carved out of <b>Bihar</b> in 2000 under the Bihar Reorganisation Act, 2000 — Bihar's southern, mineral-rich plateau region became the new state.</div>
  </div>
</section>

<!-- CITIZENSHIP ART 5-11 -->
<section class="section" id="citizen5-11">
  <h2 class="section-title">Citizenship — Articles 5–11</h2>
  <p class="section-sub">Part II of the Constitution — citizenship at the commencement of the Constitution (26 Jan 1950)</p>

  <div class="grid cols-2">
    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>Article 5 — Citizenship at commencement</h3>
      <ul>
        <li>Every person <b>domiciled in India</b> at commencement who was (a) born in India, or (b) either parent born in India, or (c) ordinarily resident for 5+ years before commencement — became a citizen.</li>
      </ul>
    </div>
    <div class="card">
      <span class="freq MEDIUM">MEDIUM</span>
      <h3>Article 6 — Migrants FROM Pakistan (to India)</h3>
      <ul>
        <li>Persons who migrated to India from Pakistan before 19 July 1948 → citizens if ordinarily resident since migration.</li>
        <li>Migrated on/after 19 July 1948 → needed to be registered after 6 months' residence.</li>
      </ul>
    </div>
    <div class="card">
      <span class="freq MEDIUM">MEDIUM</span>
      <h3>Article 7 — Migrants TO Pakistan (who returned)</h3>
      <ul>
        <li>Persons who migrated to Pakistan after 1 March 1947 but later returned to India under a <b>resettlement permit</b> — treated like Article 6 migrants.</li>
        <li>This article "overrides" Article 5 and 6 for such persons.</li>
      </ul>
    </div>
    <div class="card">
      <span class="freq LOW">LOW</span>
      <h3>Article 8 — Persons of Indian origin residing outside India</h3>
      <ul>
        <li>A person (or whose parents/grandparents) born in undivided India, but residing outside India → can register as a citizen with an Indian diplomatic mission.</li>
      </ul>
    </div>
    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>Article 9 — Voluntary acquisition of foreign citizenship</h3>
      <ul>
        <li>If a person <b>voluntarily acquires citizenship of a foreign state</b>, they cease to be an Indian citizen.</li>
        <li>This is the constitutional basis for <b>no dual citizenship</b> in India.</li>
      </ul>
    </div>
    <div class="card">
      <span class="freq LOW">LOW</span>
      <h3>Article 10 — Continuance of citizenship rights</h3>
      <ul>
        <li>Every citizen shall continue to enjoy citizenship rights <b>subject to</b> any law made by Parliament.</li>
      </ul>
    </div>
    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>Article 11 — Parliament to regulate citizenship by law</h3>
      <ul>
        <li>Parliament may make <b>any provision</b> for acquisition and termination of citizenship, and all matters relating to it.</li>
        <li>This power gave rise to the <b>Citizenship Act, 1955</b> (and its later amendments).</li>
      </ul>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <h3>Single vs Dual Citizenship</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Feature</th><th>Single Citizenship (India)</th><th>Dual Citizenship (e.g., USA)</th></tr>
        <tr><td>Basis</td><td>One citizenship for whole country despite federal structure</td><td>Citizenship of state + nation both</td></tr>
        <tr><td>Rights source</td><td>Uniform across India</td><td>Can vary state to state</td></tr>
        <tr><td>Reason adopted in India</td><td>To promote unity & integration after Partition</td><td>Historical federal bargaining</td></tr>
      </table>
    </div>
  </div>

  <div class="mnemonic"><b>Mnemonic for Articles 5–11:</b> "<b>D</b>omicile (5), <b>M</b>igrated-in (6), <b>M</b>igrated-out-returned (7), <b>O</b>utside-origin (8), <b>V</b>oluntary foreign citizenship lost (9), <b>C</b>ontinuance (10), <b>P</b>arliament regulates (11)" → <b>D-M-M-O-V-C-P</b>.</div>
</section>

<!-- ACQUISITION & TERMINATION -->
<section class="section" id="acq-term">
  <h2 class="section-title">Acquisition & Termination of Citizenship</h2>
  <p class="section-sub">Citizenship Act, 1955 (as amended, incl. CAA 2019)</p>

  <div class="grid cols-2">
    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>5 Modes of Acquiring Citizenship</h3>
      <ul>
        <li><b>1. By Birth</b> — born in India; rules tightened over time based on parents' citizenship/status (esp. after 1987 and 2003 amendments).</li>
        <li><b>2. By Descent</b> — born outside India to Indian citizen parent(s); registration with Indian consulate required.</li>
        <li><b>3. By Registration</b> — for persons of Indian origin, or those married to Indian citizens, after specified residence conditions.</li>
        <li><b>4. By Naturalisation</b> — foreigner applies after fulfilling residence (usually 11–12 years) and other conditions; grant by Central Government.</li>
        <li><b>5. By Incorporation of Territory</b> — if new territory becomes part of India, Government of India specifies who among its people become citizens (e.g., Goa, Sikkim, Puducherry).</li>
      </ul>
      <div class="mnemonic"><b>Mnemonic:</b> "<b>B</b>irth, <b>D</b>escent, <b>R</b>egistration, <b>N</b>aturalisation, <b>I</b>ncorporation" → <b>"Bade Din Rahe Naye India mein"</b>.</div>
    </div>

    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>3 Modes of Termination of Citizenship</h3>
      <ul>
        <li><b>1. Renunciation</b> — voluntary act; citizen declares renunciation, and if of full age/capacity, minor children also lose citizenship (can resume at 18).</li>
        <li><b>2. Termination</b> — automatic when a citizen voluntarily acquires citizenship of another country (linked to Article 9).</li>
        <li><b>3. Deprivation</b> — compulsory action by the Government (e.g., citizenship obtained by fraud, disloyalty to Constitution, aiding an enemy during war, imprisonment within 5 years of registration/naturalisation).</li>
      </ul>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <span class="freq HIGH">HIGH</span>
    <h3>Renunciation vs Termination vs Deprivation</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Mode</th><th>Trigger</th><th>Who initiates</th></tr>
        <tr><td>Renunciation</td><td>Voluntary declaration</td><td>The citizen</td></tr>
        <tr><td>Termination</td><td>Voluntary acquisition of foreign citizenship</td><td>Automatic (law/Art. 9)</td></tr>
        <tr><td>Deprivation</td><td>Fraud, disloyalty, aiding enemy, etc.</td><td>Central Government (compulsory)</td></tr>
      </table>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <span class="freq HIGH">HIGH</span>
    <h3>Citizenship (Amendment) Act, 2019 (CAA)</h3>
    <ul>
      <li>Provides a path to Indian citizenship for undocumented migrants belonging to <b>Hindu, Sikh, Buddhist, Jain, Parsi, and Christian</b> communities from <b>Afghanistan, Pakistan, and Bangladesh</b>.</li>
      <li>Applicable to those who entered India on or before <b>31 December 2014</b>.</li>
      <li>Reduces required residency period for naturalisation for these groups from 11 years to <b>5 years</b>.</li>
      <li>Does not apply to areas under the Sixth Schedule or states protected by the Inner Line Permit (e.g., much of the North-East).</li>
      <li>Rules notified in <b>2024</b>, implementation and eligibility criteria have seen legal and political debate — a recurring current-affairs + static overlap topic.</li>
    </ul>
    <div class="bihar"><b>Bihar Connect:</b> Bihar does not fall under CAA exemption zones (unlike parts of North-East India) — the Act applies fully across the state, making it a commonly tested current-affairs angle in BPSC/SSC papers set from Bihar.</div>
  </div>
</section>

<!-- OCI -->
<section class="section" id="oci">
  <h2 class="section-title">Overseas Citizen of India (OCI)</h2>
  <p class="section-sub">Not full citizenship — a special long-term visa-like status</p>

  <div class="grid cols-2">
    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>Background</h3>
      <ul>
        <li>Introduced by the <b>Citizenship (Amendment) Act, 2003</b>; scheme notified in 2005.</li>
        <li>In <b>2015</b>, the <b>PIO (Person of Indian Origin) Card scheme was merged</b> into the OCI scheme.</li>
        <li>OCI is <b>not dual citizenship</b> — India does not recognise dual citizenship (per Article 9).</li>
      </ul>
    </div>
    <div class="card">
      <span class="freq HIGH">HIGH</span>
      <h3>OCI — key features</h3>
      <ul>
        <li>Multi-purpose, multiple-entry, lifelong visa to visit India.</li>
        <li>Exemption from registering with local police for any length of stay.</li>
        <li>Parity with NRIs in economic, financial, and educational fields (except agricultural/plantation land purchase).</li>
      </ul>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <span class="freq HIGH">HIGH</span>
    <h3>What OCIs CANNOT do</h3>
    <ul>
      <li>Cannot vote in Indian elections.</li>
      <li>Cannot hold constitutional posts (President, Vice-President, Judge of SC/HC, etc.).</li>
      <li>Cannot contest for Lok Sabha/Rajya Sabha/State Legislature seats.</li>
      <li>Cannot normally hold government jobs (except in specific notified cases).</li>
      <li>Cannot purchase agricultural or plantation land.</li>
    </ul>
  </div>

  <div class="card" style="margin-top:14px;">
    <span class="freq HIGH">HIGH</span>
    <h3>OCI vs NRI vs PIO — comparison</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Status</th><th>Meaning</th><th>Citizenship</th><th>Voting Rights</th></tr>
        <tr><td>NRI</td><td>Indian citizen living abroad (tax/residency status)</td><td>Indian citizen</td><td>Yes (if enrolled)</td></tr>
        <tr><td>PIO (merged into OCI, 2015)</td><td>Foreign citizen of Indian origin (old scheme)</td><td>Foreign citizen</td><td>No</td></tr>
        <tr><td>OCI</td><td>Foreign citizen with lifelong Indian visa privileges</td><td>Foreign citizen</td><td>No</td></tr>
      </table>
    </div>
  </div>

  <div class="mnemonic"><b>Mnemonic:</b> "OCI = <b>O</b>nly <b>C</b>ard, not <b>I</b>ndian passport" — remember OCI holders never get full citizenship rights (no vote, no constitutional post).</div>
</section>
